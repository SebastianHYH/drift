services:
  db:
    image: postgres:16-alpine
    container_name: drift-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: drift
      POSTGRES_PASSWORD: drift
      POSTGRES_DB: drift
    ports:
      - "5432:5432"
    volumes:
      - drift-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drift -d drift"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  drift-pgdata:
